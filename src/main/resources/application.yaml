server:
  port: 8087
  servlet:
    context-path: '/ead-authuser'

spring:
  application:
    name: authuser
  datasource:
    url: jdbc:postgresql://localhost:5432/ead-authuser
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
      jdbc:
        lob.non_contextual_creation: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true